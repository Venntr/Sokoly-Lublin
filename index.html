<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Podgląd Kamer - Sokół</title>

<style>
body { 
    margin: 0; 
    padding: 5px; 
    background-color: #ffffff; 
    display: flex; 
    flex-direction: column; 
    gap: 10px;
    align-items: center;
}

/* komputer */
@media (min-width: 900px) {
    body { 
        flex-direction: row; 
        flex-wrap: wrap; 
        justify-content: center; 
    }
    .container { 
        width: 32vw; 
        height: 18vw; 
    }
}

/* telefon */
@media (max-width: 899px) {
    .container { 
        width: 100vw; 
        height: 56.25vw; 
    }
}

.container { 
    position: relative;
    overflow: hidden;
    border: 1px solid #ccc;
}

iframe { 
    position: absolute;
    top: -115px; 
    left: 0;
    width: 100%; 
    height: 130%; 
    border: none; 
}
</style>
</head>

<body>

<div class="container">
<iframe 
src="https://sokoly.edu.pl/c0b4918a-13d8-4ecb-b9b3-812e7476a8b7.html" 
allow="autoplay"
id="cam1">
</iframe>
</div>

<div class="container">
<iframe 
src="https://sokoly.edu.pl/0635c8f5-1d42-40f9-8fbd-0a3d335e55d2.html" 
allow="autoplay">
</iframe>
</div>

<div class="container">
<iframe 
src="https://sokoly.edu.pl/59499a3c-5b91-4713-be58-22aaebe60826.html" 
allow="autoplay">
</iframe>
</div>

<script>
/* jednorazowe kliknięcie włącza dźwięk pierwszej kamery */
document.body.addEventListener("click", function() {
    let frame = document.getElementById("cam1");
    frame.src = frame.src; 
}, { once: true });
</script>

</body>
</html>
