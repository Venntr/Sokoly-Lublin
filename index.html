<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Podgląd Kamer - Sokół</title>
    <style>
        body { 
            margin: 0; 
            padding: 5px; 
            background-color: #000; 
            display: flex; 
            flex-wrap: wrap; /* Pozwala oknom przeskoczyć obok siebie na dużym ekranie */
            justify-content: center;
            gap: 10px; 
        }

        .container { 
            position: relative;
            /* Na telefonie: 100% szerokości. Na komputerze: ok. 32% (trzy obok siebie) */
            width: calc(100% - 10px); 
            padding-bottom: 56.25%; /* Proporcje 16:9 */
            height: 0;
            background: #111;
        }

        /* Styl dla dużych ekranów (np. komputer) */
        @media (min-width: 900px) {
            .container {
                width: calc(33% - 10px); 
                padding-bottom: 18.5%; /* Dopasowanie wysokości w rzędzie */
            }
        }

        iframe { 
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%; 
            border: none; 
        }
    </style>
</head>
<body>

    <div class="container">
        <iframe src="https://www.youtube.com/embed/live_stream?channel=UCv-lH64wF8pX-2S60iI6Kdw&autoplay=1" allow="autoplay; fullscreen"></iframe>
    </div>

    <div class="container">
        <iframe src="https://www.youtube.com/embed/live_stream?channel=UCv-lH64wF8pX-2S60iI6Kdw&autoplay=1&mute=1" allow="autoplay; fullscreen"></iframe>
    </div>

    <div class="container">
        <iframe src="https://www.youtube.com/embed/live_stream?channel=UCv-lH64wF8pX-2S60iI6Kdw&autoplay=1&mute=1" allow="autoplay; fullscreen"></iframe>
    </div>

</body>
</html>
