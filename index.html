    <style>
        body { margin: 0; padding: 0; display: flex; flex-direction: column; background: #000; }
        
        /* Na komputerze wyświetlaj obok siebie */

            body { flex-direction: row; flex-wrap: wrap; }

        /* Na telefonie jeden pod drugim */

        }

        iframe { border: none; display: block; }
    </style>
</head>
