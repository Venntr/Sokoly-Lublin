<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ptaki na żywo</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #1a1a1a;
            font-family: sans-serif;
            color: white;
        }
        h1 { text-align: center; font-size: 1.5rem; }
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .video-wrapper {
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        video {
            width: 100%;
            display: block;
            aspect-ratio: 16 / 9;
        }
        iframe {
            width: 100%;
            display: block;
            aspect-ratio: 16 / 9;
            border: none;
        }
        .label {
            padding: 10px;
            background: #333;
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Podgląd na żywo</h1>
    <div class="container">
        <div class="video-wrapper">
            <video id="video1" controls muted autoplay playsinline></video>
            <div class="label">Bociany w Rzepedzi</div>
        </div>
        
        <div class="video-wrapper">
            <video id="video2" controls muted autoplay playsinline></video>
            <div class="label">Sokoły Lublin 1</div>
        </div>
        <div class="video-wrapper">
            <video id="video3" controls muted autoplay playsinline></video>
            <div class="label">Sokoły Lublin 2</div>
        </div>
        <div class="video-wrapper">
            <video id="video4" controls muted autoplay playsinline></video>
            <div class="label">Sokoły Lublin 3</div>
        </div>
        <div class="video-wrapper">
            <video id="video5" controls muted autoplay playsinline></video>
            <div class="label">Sokoły Trzebież 1</div>
        </div>
        <div class="video-wrapper">
            <video id="video6" controls muted autoplay playsinline></video>
            <div class="label">Sokoły Trzebież 2</div>
        </div>
        <div class="video-wrapper">
            <video id="video7" controls muted autoplay playsinline></video>
            <div class="label">Sokoły Dolina Baryczy</div>
        </div>
        <div class="video-wrapper">
            <iframe
                src="https://www.youtube.com/embed/ZSdTJ3Drcz8?autoplay=1&mute=1"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                allowfullscreen>
            </iframe>
            <div class="label">Bociany Polanów</div>
        </div>
        <div class="video-wrapper">
            <iframe
                src="https://www.youtube.com/embed/WBUBbFgiOJM?autoplay=1&mute=1"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                allowfullscreen>
            </iframe>
            <div class="label">Bociany Czarne Bolewice</div>
        </div>
    </div>
    <script>
        const streams = [
            { id: 'video1', url: 'https://stream4.stimotion.pl/live/bocian1.m3u8' },
            { id: 'video2', url: 'https://sokoly.ovh/memfs/cfd283d1-4c4a-4a1a-a969-27865ce499f4.m3u8' },
            { id: 'video3', url: 'https://sokoly.ovh/memfs/35360187-5beb-466d-b0f3-3df0d45a0c1c.m3u8' },
            { id: 'video4', url: 'https://sokoly.ovh/memfs/eded79f7-aae7-4a81-b1fc-f99868cf52ce.m3u8' },
            { id: 'video5', url: 'https://7004.szczecin.pl/Lasam/streams/lasstream.m3u8'},
            { id: 'video6', url: 'https://7004.szczecin.pl/Lasam/streams/lasstream2.m3u8'},
            { id: 'video7', url: 'https://7004.szczecin.pl/pgetorun/streams/milicz.m3u8'}
        ];
        streams.forEach(stream => {
            const video = document.getElementById(stream.id);
            
            if (Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(stream.url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    video.play();
                });
            } 
            else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = stream.url;
                video.addEventListener('loadedmetadata', function() {
                    video.play();
                });
            }
        });
    </script>
</body>
</html>
