<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            background-color: #000; /* Czarny kolor między oknami wygląda lepiej */
            display: flex; 
            flex-direction: column; 
            gap: 2px; 
        }
        .container { 
            position: relative;
            width: 100vw; 
            height: 56.25vw; /* Idealne proporcje 16:9 */
            overflow: hidden; /* To odcina białe boki i menu strony */
        }
        iframe { 
            position: absolute;
            top: -110px; /* Przesunięcie w górę, by ukryć nagłówek strony */
            left: 0;
            width: 100%; 
            height: calc(100% + 200px); /* Zwiększenie wysokości, by ukryć stopkę */
            border: none; 
        }
    </style>
</head>
<body>

    <div class="container">
        <iframe src="https://sokoly.edu.pl/c0b4918a-13d8-4ecb-b9b3-812e7476a8b7.html"></iframe>
    </div>

    <div class="container">
        <iframe src="https://sokoly.edu.pl/0635c8f5-1d42-40f9-8fbd-0a3d335e55d2.html"></iframe>
    </div>

    <div class="container">
        <iframe src="https://sokoly.edu.pl/59499a3c-5b91-4713-be58-22aaebe60826.html"></iframe>
    </div>

</body>
</html>
