<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            display: flex; 
            flex-direction: column; 
            background-color: #000; /* Czarne tło niweluje błyski przy ładowaniu */
            gap: 2px; 
        }
        .container { 
            position: relative;
            width: 100vw; 
            padding-bottom: 56.25%; /* Proporcje 16:9 */
            height: 0;
            background: #000;
        }
        iframe { 
            position: absolute;
            top: 0;
            left: 0;
            width: 100%; 
            height: 100%; 
            border: none; 
        }
    </style>
</head>
<body>

    <div class="container">
        <iframe src="https://www.youtube.com/embed/live_stream?channel=UCpP79986Vp6-pT_v0T3X7vA&autoplay=1" allow="autoplay; fullscreen"></iframe>
    </div>

    <div class="container">
        <iframe src="https://www.youtube.com/embed/live_stream?channel=UCpP79986Vp6-pT_v0T3X7vA&autoplay=1&mute=1" allow="autoplay; fullscreen"></iframe>
    </div>

    <div class="container">
        <iframe src="https://www.youtube.com/embed/live_stream?channel=UCpP79986Vp6-pT_v0T3X7vA&autoplay=1&mute=1" allow="autoplay; fullscreen"></iframe>
    </div>

</body>
</html>
